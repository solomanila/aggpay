spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/aggpay?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 30000

  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: 6379
    password: ${REDIS_PASSWORD:}

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: pay-service-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

wanli:
  sign:
    check: 0

telegram-bot:
  enabled: true
  token: ${TELEGRAM_BOT_TOKEN:}

  app-key: ${SHOPLINE_APP_KEY:a3b199b51b1dbf5eec4b73ae53cdef1561b8eefb}
  app-secret: ${SHOPLINE_APP_SECRET:e70f73b4ab5fc302e23e7ffbcb0af54cfdf0266f}
shopline:
  public-key: ${SHOPLINE_PUBLIC_KEY:}
  api-base: https://openapi.myshopline.com
  api-version: 2023-01
  redirect-uri: ${SHOPLINE_REDIRECT_URI:https://pay.zyapay.com/api/pay/shopline/callback}
  login-base-url: ${SHOPLINE_LOGIN_BASE_URL:https://13.234.6.115}
  scopes: write_discounts,write_store_information,read_store_information,write_payment_gateways,read_script_tags,write_shop_policy,write_price_rules,write_fulfillment_service,read_bulkoperation,write_inventory,read_orders,write_content,read_marketing_event,read_inventory,write_orders,read_discounts,read_products,read_content,read_returns,read_fulfillment_service,write_products,read_location,read_shipping,read_translation,read_selling_plan_group,read_themes,write_subscription_contracts,write_bulkoperation,write_translation,read_customers,read_payment,write_checkouts,read_shop_policy,write_customers,read_markets,read_product_listings,write_files,read_store_metrics,read_gift_card,write_script_tags,write_product_listings,write_return,write_page,read_subscription_contracts,write_selling_plan_group,read_assigned_fulfillment_orders,write_shipping,read_page,write_themes,read_price_rules,write_gift_card,write_markets,write_assigned_fulfillment_orders,read_files,read_draft_orders,write_marketing_event,write_draft_orders

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
