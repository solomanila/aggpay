pay:
  ratelimit:
    global:
      tps: 500
    channel:
      tps: 100
    merchant:
      tps: 50
    ip:
      limit: 100
      window: 60000
    user:
      limit: 20
      window: 60000
    idempotency:
      ttl: 300

